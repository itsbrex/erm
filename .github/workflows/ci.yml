name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Compile check
        run: uv run python -m py_compile src/erm/*.py

  plugin-version-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0 # need full tag history for the comparison

      - name: plugin.json must match the latest release tag
        run: |
          PLUGIN=$(jq -r .version .claude-plugin/plugin.json)
          TAG=$(git tag --list 'v*' --sort=-v:refname | head -1)
          if [ -z "$TAG" ]; then
            echo "No v* tags yet; skipping pin check."
            exit 0
          fi
          if [ "v$PLUGIN" != "$TAG" ]; then
            echo "::error file=.claude-plugin/plugin.json::plugin.json version ($PLUGIN) must equal the latest release tag ($TAG). release.yml pins this automatically — do not hand-edit the version."
            exit 1
          fi
          echo "plugin.json $PLUGIN matches latest release $TAG"

  test:
    runs-on: ubuntu-latest
    needs: [lint]
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install ffmpeg
        # erm shells out to ffmpeg/ffprobe; the video I/O tests synthesize real
        # clips and exercise the render/mux paths, skipping themselves when these
        # binaries are absent. Install them so that coverage actually runs in CI
        # instead of silently being skipped.
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          ffmpeg -version | head -1

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dev deps
        run: uv sync --extra dev --python ${{ matrix.python-version }}

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short
