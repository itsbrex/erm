name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (validate without publishing)"
        required: false
        type: boolean
        default: false
      create_tag:
        description: "Create git tag + GitHub Release after publish"
        required: false
        type: boolean
        default: true
      next_version:
        description: "Next dev version to bump main to after release (blank = auto: minor bump, or drop the pre-release suffix)"
        required: false
        type: string
        default: ""

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Read and verify version
        id: version
        run: |
          source scripts/common.sh
          PY_VER=$(get_pyproject_version)
          INIT_VER=$(get_init_version)
          echo "pyproject.toml version: $PY_VER"
          echo "__init__.py version:    $INIT_VER"
          if [ "$PY_VER" != "$INIT_VER" ]; then
            echo "::error::Version mismatch: pyproject=$PY_VER init=$INIT_VER"
            echo "Run 'make sync-version VERSION=x.y.z' to synchronize."
            exit 1
          fi
          echo "version=$PY_VER" >> "$GITHUB_OUTPUT"
          echo "All version sources at: $PY_VER"

      - name: Check tag doesn't already exist on remote
        if: ${{ inputs.create_tag && !inputs.dry_run }}
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG already exists on origin. Bump the version first."
            exit 1
          fi
          echo "Tag $TAG is available"

  ci:
    needs: preflight
    uses: ./.github/workflows/ci.yml

  publish-python:
    needs: [preflight, ci]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Build package
        run: ./scripts/build-python.sh

      - name: Validate package
        run: uv run --with twine -- twine check dist/*

      - name: Verify built artifacts match version
        run: |
          source scripts/common.sh
          EXPECTED=$(get_pyproject_version)
          for artifact in dist/*; do
            base="$(basename "$artifact")"
            case "$base" in
              "erm-$EXPECTED.tar.gz"|"erm-$EXPECTED-"*.whl)
                ;;
              *)
                echo "::error::Stale artifact: $base (expected version $EXPECTED)"
                exit 1
                ;;
            esac
          done
          echo "All artifacts match version $EXPECTED"

      - name: Publish to PyPI (Trusted Publishing)
        if: ${{ !inputs.dry_run }}
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0

      - name: Dry run summary
        if: ${{ inputs.dry_run }}
        run: echo "Dry run - would publish erm ${{ needs.preflight.outputs.version }} to PyPI"

  create-release:
    needs: [preflight, publish-python]
    if: ${{ inputs.create_tag && !inputs.dry_run }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pin plugin.json to the released version and tag
        run: |
          VERSION="${{ needs.preflight.outputs.version }}"
          TAG="v${VERSION}"
          PLUGIN=".claude-plugin/plugin.json"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Pin the plugin manifest to the version we just published. The dev
          # bump (version-bump.yml) only moves the Python version forward, so
          # plugin.json stays at the latest *released* version. Edit only the
          # version line to keep the diff minimal.
          sed -i -E "s/(\"version\"[[:space:]]*:[[:space:]]*\")[^\"]*(\")/\1${VERSION}\2/" "$PLUGIN"

          if ! git diff --quiet -- "$PLUGIN"; then
            git commit --only "$PLUGIN" -m "chore: pin plugin.json to released ${TAG}"
          else
            echo "plugin.json already at ${VERSION}"
          fi

          # Tag the commit that carries the pinned plugin.json, then push the
          # branch and tag in a single atomic push so CI never sees main updated
          # before the matching tag exists (the version-guard would flap).
          git tag -a "$TAG" -m "Release $TAG"
          git push --atomic origin "HEAD:main" "refs/tags/$TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: "v${{ needs.preflight.outputs.version }}"
          name: "Release v${{ needs.preflight.outputs.version }}"
          prerelease: ${{ contains(needs.preflight.outputs.version, 'a') || contains(needs.preflight.outputs.version, 'b') || contains(needs.preflight.outputs.version, 'rc') }}
          generate_release_notes: true
          body: |
            **PyPI**: [erm ${{ needs.preflight.outputs.version }}](https://pypi.org/project/erm/${{ needs.preflight.outputs.version }}/)

  bump-next:
    # Open the next dev cycle: bump main's Python version forward right after a
    # real, tagged release. Only pyproject.toml + __init__.py (+ uv.lock) move;
    # plugin.json stays pinned to the just-released tag (release.yml pins it,
    # and the next release re-pins it), so the plugin-version-guard stays green.
    needs: [preflight, create-release]
    if: ${{ inputs.create_tag && !inputs.dry_run }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: main # has the plugin.json pin commit pushed by create-release
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Compute next dev version
        id: next
        env:
          RELEASED: ${{ needs.preflight.outputs.version }}
          OVERRIDE: ${{ inputs.next_version }}
        run: |
          if [ -n "$OVERRIDE" ]; then
            NEXT="$OVERRIDE"
            echo "Using explicit next_version: $NEXT"
          elif echo "$RELEASED" | grep -qE '(a|b|rc)[0-9]+$'; then
            # Released a pre-release (e.g. 0.5.0rc1): the next dev version is the
            # final release of that same X.Y.Z.
            NEXT="$(echo "$RELEASED" | sed -E 's/(a|b|rc)[0-9]+$//')"
            echo "Released pre-release $RELEASED; next dev version: $NEXT"
          else
            # Final release (e.g. 0.4.0): open the next minor (0.5.0).
            MAJOR="$(echo "$RELEASED" | cut -d. -f1)"
            MINOR="$(echo "$RELEASED" | cut -d. -f2)"
            NEXT="${MAJOR}.$((MINOR + 1)).0"
            echo "Released $RELEASED; opening next minor: $NEXT"
          fi
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version and push to main
        run: |
          ./scripts/sync-version.sh "${{ steps.next.outputs.next }}" --commit
          git push origin HEAD:main
