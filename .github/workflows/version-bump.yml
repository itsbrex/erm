name: Version Bump

on:
  workflow_dispatch:
    inputs:
      version:
        description: "New version (PEP 440: 0.2.0 or 0.2.0b1, 0.2.0rc1, 0.2.0a1)"
        required: true
        type: string

permissions:
  contents: write

env:
  VERSION: ${{ inputs.version }}

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Validate version format
        run: |
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+((a|b|rc)[0-9]+)?$'; then
            echo "::error::Invalid version: $VERSION"
            echo "Expected PEP 440: X.Y.Z or X.Y.Z{a,b,rc}N"
            exit 1
          fi
          echo "Version format valid: $VERSION"

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: main
          # Need a token that can push to a branch-protected main if you
          # protect it later; default GITHUB_TOKEN works for unprotected.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version and commit to main
        run: ./scripts/sync-version.sh "$VERSION" --commit

      - name: Push to main
        run: git push origin HEAD:main
